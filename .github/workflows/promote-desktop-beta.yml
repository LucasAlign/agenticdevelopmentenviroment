name: Promote Windows Desktop Private Beta

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Candidate tag (desktop-vX.Y.Z-beta.N)"
        required: true
        type: string
      confirmation:
        description: "Type: publish <tag>"
        required: true
        type: string
      windows_10_acceptance:
        description: "Windows 10 x64 clean-machine acceptance URL"
        required: true
        type: string
      windows_11_acceptance:
        description: "Windows 11 x64 clean-machine acceptance URL"
        required: true
        type: string

concurrency:
  group: promote-desktop-beta-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote:
    name: Verify and publish existing draft
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Validate request, tag, and draft metadata
        id: candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          CONFIRMATION: ${{ inputs.confirmation }}
          WINDOWS_10_ACCEPTANCE: ${{ inputs.windows_10_acceptance }}
          WINDOWS_11_ACCEPTANCE: ${{ inputs.windows_11_acceptance }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^desktop-v([0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+)$ ]]; then
            echo "Invalid private beta tag: $TAG" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          if [[ "$CONFIRMATION" != "publish $TAG" ]]; then
            echo "Confirmation must be exactly: publish $TAG" >&2
            exit 1
          fi
          if [[ ! "$WINDOWS_10_ACCEPTANCE" =~ ^https://github\.com/ ]] || [[ ! "$WINDOWS_11_ACCEPTANCE" =~ ^https://github\.com/ ]]; then
            echo "Acceptance evidence must use GitHub URLs visible to private-repository testers" >&2
            exit 1
          fi

          git fetch origin main --no-tags
          git fetch origin "refs/tags/$TAG:refs/tags/$TAG"
          tag_sha="$(git rev-parse "$TAG^{commit}")"
          git merge-base --is-ancestor "$tag_sha" origin/main

          release_json="$(gh release view "$TAG" --repo '${{ github.repository }}' --json tagName,isDraft,isPrerelease,body)"
          [[ "$(jq -r .tagName <<<"$release_json")" == "$TAG" ]]
          [[ "$(jq -r .isDraft <<<"$release_json")" == "true" ]]
          [[ "$(jq -r .isPrerelease <<<"$release_json")" == "true" ]]

          api_tag_sha="$(gh api 'repos/${{ github.repository }}/commits/'"$TAG" --jq .sha)"
          [[ "$api_tag_sha" == "$tag_sha" ]]

          release_body="$(jq -r .body <<<"$release_json")"
          grep -Fq '${{ github.server_url }}/${{ github.repository }}/actions/runs/' <<<"$release_body"
          grep -Fq "$WINDOWS_10_ACCEPTANCE" <<<"$release_body"
          grep -Fq "$WINDOWS_11_ACCEPTANCE" <<<"$release_body"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "installer_name=ADE-$version-x64.exe" >> "$GITHUB_OUTPUT"

      - name: Download exact draft assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir beta-assets
          gh release download '${{ inputs.tag }}' --repo '${{ github.repository }}' --dir beta-assets
          actual="$(find beta-assets -maxdepth 1 -type f -printf '%f\n' | sort | tr '\n' ' ')"
          expected="SHA256SUMS.txt ${{ steps.candidate.outputs.installer_name }} "
          [[ "$actual" == "$expected" ]]
          cd beta-assets
          sha256sum --check SHA256SUMS.txt

      - name: Publish verified draft without rebuilding
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit '${{ inputs.tag }}' \
            --repo '${{ github.repository }}' \
            --draft=false \
            --prerelease \
            --latest=false
