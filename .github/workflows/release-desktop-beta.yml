name: Build Windows Desktop Private Beta

on:
  push:
    tags:
      - "desktop-v*-beta.*"

concurrency:
  group: desktop-beta-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build and verify Windows x64 candidate
    runs-on: windows-2022
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      installer_name: ${{ steps.version.outputs.installer_name }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Validate tag and derive package version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^desktop-v(?<version>[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+)$') {
            throw "Invalid private beta tag: $tag"
          }
          $version = $Matches.version
          $installerName = "ADE-$version-x64.exe"

          git fetch origin main --no-tags
          git merge-base --is-ancestor "${{ github.sha }}" origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Tagged commit must be contained in origin/main"
          }

          gh release view $tag --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "A release already exists for $tag"
          }

          $packagePath = "apps/desktop/package.json"
          $packageJson = Get-Content -Raw $packagePath
          $updatedPackageJson = $packageJson -replace '(?m)^(\s*"version":\s*)"[^"]+"', "`$1`"$version`""
          if ($updatedPackageJson -eq $packageJson) {
            throw "Desktop package version was not updated"
          }
          [IO.File]::WriteAllText(
            (Resolve-Path $packagePath),
            $updatedPackageJson,
            [Text.UTF8Encoding]::new($false)
          )

          "version=$version" >> $env:GITHUB_OUTPUT
          "installer_name=$installerName" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.6

      - name: Install frozen dependencies
        run: bun install --frozen

      - name: Run private beta quality gates
        shell: pwsh
        run: |
          bunx sherif
          bun run typecheck
          bun test `
            apps/desktop/electron-builder.test.ts `
            apps/desktop/scripts/build-desktop-workflow.test.ts `
            apps/desktop/src/shared/constants.test.ts

      - name: Compile desktop application
        working-directory: apps/desktop
        run: bun run compile:app
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset

      - name: Package unsigned Windows x64 NSIS candidate
        working-directory: apps/desktop
        shell: pwsh
        run: bun run package -- --win nsis --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify unpacked packaged runtime
        working-directory: apps/desktop
        run: bun run validate:packaged-windows-runtime release/win-unpacked "${{ steps.version.outputs.version }}"

      - name: Smoke test install, clean-PATH launch, and uninstall retention
        shell: pwsh
        run: |
          ./apps/desktop/scripts/smoke-installed-windows.ps1 `
            -InstallerPath "apps/desktop/release/${{ steps.version.outputs.installer_name }}"

      - name: Verify installer identity and signature
        id: verify
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $expectedName = "${{ steps.version.outputs.installer_name }}"
          $installers = @(Get-ChildItem -Path release -Filter '*.exe' -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one installer, found $($installers.Count)"
          }
          $installer = $installers[0]
          if ($installer.Name -ne $expectedName) {
            throw "Expected $expectedName, got $($installer.Name)"
          }
          if ($installer.Length -le 0) {
            throw "Installer is empty"
          }

          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          if ($signature.Status -ne 'NotSigned') {
            throw "Private beta installer must be unsigned; status was $($signature.Status)"
          }

          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          $checksumPath = Join-Path release 'SHA256SUMS.txt'
          "$hash  $expectedName" | Set-Content -Encoding utf8 $checksumPath

          $recorded = (Get-Content -Raw $checksumPath).Trim() -split '\s+', 2
          $recomputed = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          if ($recorded[0] -ne $recomputed -or $recorded[1] -ne $expectedName) {
            throw "SHA256SUMS.txt verification failed"
          }

      - name: Stage verified candidate assets
        working-directory: apps/desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path beta-assets -Force | Out-Null
          Copy-Item -LiteralPath "release/${{ steps.version.outputs.installer_name }}" -Destination beta-assets
          Copy-Item -LiteralPath release/SHA256SUMS.txt -Destination beta-assets

      - name: Upload verified candidate
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-beta-${{ steps.version.outputs.version }}-windows-x64
          path: apps/desktop/beta-assets/*
          retention-days: 30
          if-no-files-found: error

  create-draft:
    name: Create draft prerelease
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download verified candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-beta-${{ needs.build-windows.outputs.version }}-windows-x64
          path: beta-assets

      - name: Reverify candidate and write release notes
        shell: bash
        run: |
          set -euo pipefail
          cd beta-assets
          expected_installer='${{ needs.build-windows.outputs.installer_name }}'
          test "$(find . -maxdepth 1 -type f -printf '%f\n' | sort | tr '\n' ' ')" = "SHA256SUMS.txt ${expected_installer} "
          sha256sum --check SHA256SUMS.txt
          cd ..
          cat > release-notes.md <<EOF
          ## ADE ${{ needs.build-windows.outputs.version }} Private Beta

          - Tag: \`${{ github.ref_name }}\`
          - Commit: \`${{ github.sha }}\`
          - Build run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Actions artifact digest: \`${{ needs.build-windows.outputs.artifact_digest }}\`

          This installer is intentionally unsigned. Windows SmartScreen is expected; invited testers must use **More info → Run anyway** after verifying the SHA-256 checksum:

          \`certutil -hashfile ${{ needs.build-windows.outputs.installer_name }} SHA256\`

          Promotion requires recorded clean-machine acceptance on Windows 10 x64 and Windows 11 x64. Git and one supported agent runtime are installed and authenticated separately; they are not bundled with ADE.

          - Windows 10 x64 acceptance: PENDING
          - Windows 11 x64 acceptance: PENDING
          EOF

      - name: Create checksummed draft prerelease
        shell: bash
        run: |
          gh release create '${{ github.ref_name }}' \
            'beta-assets/${{ needs.build-windows.outputs.installer_name }}' \
            beta-assets/SHA256SUMS.txt \
            --repo '${{ github.repository }}' \
            --verify-tag \
            --draft \
            --prerelease \
            --latest=false \
            --title 'ADE ${{ needs.build-windows.outputs.version }} Private Beta' \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
